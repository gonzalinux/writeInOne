services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${APP_MANAGEMENT_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5433}
      DB_NAME: ${DB_NAME:-writeinone}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_PORT: 8081
      JSON_LOG_PATH: /app/logs/app.json.log
    volumes:
      - logs:/app/logs
    depends_on:
      db:
        condition: service_started
        required: false
    extra_hosts:
      - database:host-gateway

  alloy:
    image: grafana/alloy:v1.15.0
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - logs:/app/logs:ro
    command: run /etc/alloy/config.alloy
    environment:
      - LOG_AGGREGATOR_URL=${LOG_AGGREGATOR_URL}
      - DEPLOY_ENV=${DEPLOY_ENV:-home}
    depends_on:
      - app

  db:
    profiles: [local-db]
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: writeinone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5433"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data:z
    command: -p 5433

volumes:
  logs:
