services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${APP_MANAGEMENT_PORT:-8081}:8081"
    environment:
      DB_HOST: db
      DB_PORT: 5433
      DB_NAME: writeinone
      DB_USER: postgres
      DB_PASSWORD: secret
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_PORT: 8081
      JSON_LOG_PATH: /app/logs/app.json.log
    volumes:
      - logs:/app/logs
    depends_on:
      - db

  alloy:
    image: grafana/alloy:v1.15.0
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - logs:/app/logs:ro
    command: run /etc/alloy/config.alloy
    environment:
      - LOG_AGGREGATOR_URL=${LOG_AGGREGATOR_URL}
      - DEPLOY_ENV=${DEPLOY_ENV:-home}
    depends_on:
      - app

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: writeinone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5433"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data:z
    command: -p 5433

volumes:
  logs:
