services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5433
      DB_NAME: writeinone
      DB_USER: postgres
      DB_PASSWORD: secret
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - db

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: writeinone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5433"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data:z
    command: -p 5433
