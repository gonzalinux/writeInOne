<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Posts — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
    <script src="/js/api.js" defer></script>
    <script src="/js/post-list.js" defer></script>
</head>
<body>
    <header>
        <span class="brand">WriteInOne</span>
        <a href="/admin">← Dashboard</a>
    </header>

    <main>
        <div class="page-header">
            <h1>Posts</h1>
            <a class="btn" id="newPostLink" href="#">+ New post</a>
        </div>

        <div class="filter-bar">
            <input id="filterSearch" type="text" placeholder="Search by title…" class="filter-bar__input"/>
            <select id="filterStatus" class="filter-bar__select">
                <option value="">All statuses</option>
                <option value="draft">Draft</option>
                <option value="published">Published</option>
                <option value="scheduled">Scheduled</option>
            </select>
            <input id="filterTag" type="text" placeholder="Tag…" class="filter-bar__input filter-bar__input--narrow"/>
            <button class="btn btn-ghost btn--small" onclick="applyFilters()">Filter</button>
            <button class="btn btn-ghost btn--small" onclick="clearFilters()">Clear</button>
        </div>

        <table id="postTable" style="display:none">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Languages</th>
                    <th>Tags</th>
                    <th>Status</th>
                    <th>Published</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="postTableBody"></tbody>
        </table>

        <div class="empty" id="empty" style="display:none">
            <p>No posts yet.</p>
            <a class="btn" id="emptyNewPostLink" href="#">Write your first post</a>
        </div>
    </main>
</body>
</html>
