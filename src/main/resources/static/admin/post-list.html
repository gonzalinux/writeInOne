<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Posts — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
    <script src="/js/api.js" defer></script>
    <script src="/js/post-list.js" defer></script>
</head>
<body>
    <header>
        <span class="brand">WriteInOne</span>
        <a href="/admin">← Dashboard</a>
    </header>

    <main>
        <div class="page-header">
            <h1>Posts</h1>
            <a class="btn" id="newPostLink" href="#">+ New post</a>
        </div>

        <table id="postTable" style="display:none">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Languages</th>
                    <th>Status</th>
                    <th>Published</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="postTableBody"></tbody>
        </table>

        <div class="empty" id="empty" style="display:none">
            <p>No posts yet.</p>
            <a class="btn" id="emptyNewPostLink" href="#">Write your first post</a>
        </div>
    </main>
</body>
</html>
