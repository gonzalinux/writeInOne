<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Post — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
    <script src="/js/api.js" defer></script>
    <script src="/js/post-form.js" defer></script>
</head>
<body>
    <header>
        <span class="brand">WriteInOne</span>
        <a id="backLink" href="/admin">← Posts</a>
    </header>

    <main class="main--narrow">
        <h1 id="pageTitle">New post</h1>
        <form id="postForm" onsubmit="return false">
            <div class="field-row">
                <div>
                    <label for="lang">Language</label>
                    <select id="lang" name="lang">
                        <option value="en">ENGLISH</option>
                        <option value="es">SPANISH</option>
                    </select>
                </div>
                <div>
                    <label for="slug">Slug <span style="color:#aaa">(optional)</span></label>
                    <input id="slug" name="slug" type="text" placeholder="auto-generated from title"/>
                </div>
            </div>

            <div class="field">
                <label for="title">Title</label>
                <input id="title" name="title" type="text" required placeholder="Post title"/>
            </div>

            <div class="field">
                <label for="excerpt">Excerpt <span style="color:#aaa">(optional)</span></label>
                <textarea id="excerpt" name="excerpt" rows="2" placeholder="A short summary shown in post listings"></textarea>
            </div>

            <div class="field">
                <label for="body">Body <span style="color:#aaa">(Markdown)</span></label>
                <textarea id="body" name="body" class="body-editor" required placeholder="Write your post in Markdown..."></textarea>
            </div>

            <div class="field-row">
                <div>
                    <label for="tags">Tags <span style="color:#aaa">(optional)</span></label>
                    <input id="tags" name="tags" type="text" placeholder="kotlin, spring, webflux"/>
                    <p class="hint">Comma-separated</p>
                </div>
                <div>
                    <label for="coverUrl">Cover image URL <span style="color:#aaa">(optional)</span></label>
                    <input id="coverUrl" name="coverUrl" type="url" placeholder="https://..."/>
                </div>
            </div>

            <p id="error" style="display:none;color:#c00;font-size:0.875rem;margin-top:0.75rem;"></p>
            <div class="actions">
                <button class="btn" type="submit">Save draft</button>
                <a class="btn btn-ghost" id="cancelLink" href="/admin">Cancel</a>
                <button id="publishBtn" type="button" class="btn btn-publish" style="display:none">Publish</button>
            </div>
        </form>
    </main>
</body>
</html>
