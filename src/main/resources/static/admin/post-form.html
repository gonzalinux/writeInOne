<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png"/>
    <link rel="manifest" href="/manifest.json"/>
    <title>Post — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
    <script src="/js/api.js" defer></script>
    <script src="/js/post-form.js" defer></script>
</head>
<body>
    <header>
        <a class="brand" href="https://WriteInOne.com"><img src="/img/logoWriteInOneGrey.png" alt="" class="brand__img"/>WriteInOne</a>
        <a id="backLink" href="/admin">← Posts</a>
    </header>

    <main class="main--narrow">
        <h1 id="pageTitle">New post</h1>
        <form id="postForm" onsubmit="return false">

            <div class="field">
                <label for="slug">Slug <span style="color:#aaa">(optional)</span></label>
                <input id="slug" type="text" placeholder="auto-generated from title"/>
            </div>

            <div id="langTabsContainer"></div>
            <div id="langPanels"></div>

            <div class="field-row">
                <div>
                    <label for="tags">Tags <span style="color:#aaa">(optional)</span></label>
                    <input id="tags" type="text" placeholder="kotlin, spring, webflux"/>
                    <p class="hint">Comma-separated</p>
                </div>
                <div>
                    <label for="coverUrl">Cover image URL <span style="color:#aaa">(optional)</span></label>
                    <input id="coverUrl" type="url" placeholder="https://..."/>
                </div>
            </div>

            <p id="error" style="display:none;color:#c00;font-size:0.875rem;margin-top:0.75rem;"></p>
            <div class="actions">
                <button class="btn" type="submit">Save draft</button>
                <a class="btn btn-ghost" id="cancelLink" href="/admin">Cancel</a>
                <button id="publishBtn" type="button" class="btn btn-publish" style="display:none">Publish</button>
                <button id="scheduleToggle" type="button" class="btn btn-ghost" style="display:none">Schedule</button>
            </div>
            <div id="scheduleSection" style="display:none">
                <div class="schedule-row">
                    <input type="datetime-local" id="scheduledAt"/>
                    <button type="button" id="scheduleBtn" class="btn">Set schedule</button>
                    <button type="button" id="clearScheduleBtn" class="btn btn-ghost" style="display:none">Clear</button>
                </div>
            </div>
        </form>
    </main>
</body>
</html>
