<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png"/>
    <link rel="manifest" href="/manifest.json"/>
    <title>Dashboard — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
    <script src="/js/api.js" defer></script>
    <script src="/js/admin.js" defer></script>
    <script src="/js/dashboard.js" defer></script>
</head>
<body>
    <header>
        <a class="brand" href="https://WriteInOne.com"><img src="/img/logoWriteInOneGrey.png" alt="" class="brand__img"/>WriteInOne</a>
        <div class="header-actions">
            <a href="#" onclick="logout(); return false;">Log out</a>
        </div>
    </header>

    <main>
        <div class="page-header">
            <h1>Your sites</h1>
            <a class="btn" href="/admin/sites/new">+ New site</a>
        </div>

        <div class="site-list" id="siteList"></div>

        <div class="empty" id="empty" style="display:none">
            <p>You don't have any sites yet.</p>
            <a class="btn" href="/admin/sites/new">Create your first site</a>
        </div>
    </main>

    <div id="verificationModal" class="modal" style="display:none">
        <div class="modal__box">
            <button class="modal__close" aria-label="Close">×</button>
            <h2 class="modal__title"></h2>
            <p class="modal__body"></p>
            <div class="modal__footer">
                <button class="btn modal__action"></button>
                <button class="btn btn-ghost modal__close">Close</button>
            </div>
        </div>
    </div>
</body>
</html>
