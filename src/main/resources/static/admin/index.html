<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
    <script src="/js/api.js" defer></script>
    <script src="/js/dashboard.js" defer></script>
</head>
<body>
    <header>
        <span class="brand">WriteInOne</span>
        <div class="header-actions">
            <a href="#" onclick="logout(); return false;">Log out</a>
        </div>
    </header>

    <main>
        <div class="page-header">
            <h1>Your sites</h1>
            <a class="btn" href="/admin/sites/new">+ New site</a>
        </div>

        <div class="site-list" id="siteList"></div>

        <div class="empty" id="empty" style="display:none">
            <p>You don't have any sites yet.</p>
            <a class="btn" href="/admin/sites/new">Create your first site</a>
        </div>
    </main>
</body>
</html>
