<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png"/>
    <title>Style Tester — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .tester-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .tester-header a {
            font-size: 0.875rem;
            color: var(--muted);
            text-decoration: none;
        }

        .tester-header a:hover {
            color: var(--fg);
        }

        .tester-header__title {
            font-size: 0.95rem;
            font-weight: 600;
            flex: 1;
        }

        .tester-layout {
            display: grid;
            grid-template-columns: 1fr 420px;
            flex: 1;
            overflow: hidden;
        }

        /* ── Preview panel ── */
        .preview-panel {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .preview-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface);
        }

        .preview-tab {
            padding: 0.5rem 1.25rem;
            font-size: 0.875rem;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--muted);
            border-bottom: 2px solid transparent;
            font-family: inherit;
            transition: color 0.15s;
        }

        .preview-tab:hover {
            color: var(--fg);
        }

        .preview-tab.active {
            color: var(--fg);
            border-bottom-color: var(--fg);
        }

        #previewFrame {
            flex: 1;
            border: none;
            width: 100%;
        }

        /* ── Editor panel ── */
        .editor-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface);
        }

        .editor-toolbar h2 {
            font-size: 0.875rem;
            font-weight: 600;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .CodeMirror {
            flex: 1;
            height: 0;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 0.8125rem;
            line-height: 1.6;
            border: none;
        }

        .CodeMirror-scroll {
            height: 100%;
        }

        .editor-status {
            padding: 0.3rem 0.75rem;
            font-size: 0.78rem;
            font-family: 'Courier New', monospace;
            color: var(--muted);
            border-top: 1px solid var(--border);
            background: var(--surface);
            min-height: 1.8rem;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Selector tooltip ── */
        #selectorTooltip {
            position: fixed;
            display: none;
            pointer-events: none;
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
            z-index: 9999;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
    </style>
    <script src="/js/api.js" defer></script>
    <script src="/js/style-tester.js" defer></script>
</head>
<body>
    <div class="tester-header">
        <a href="/admin">&larr; Dashboard</a>
        <span class="tester-header__title" id="siteName">Style Tester</span>
    </div>

    <div class="tester-layout">
        <div class="preview-panel">
            <div class="preview-tabs">
                <button class="preview-tab active" data-view="index">Index view</button>
                <button class="preview-tab" data-view="post">Post view</button>
            </div>
            <iframe id="previewFrame" title="Blog preview"></iframe>
        </div>

        <div class="editor-panel">
            <div class="editor-toolbar">
                <h2 id="editorSiteName">Custom CSS</h2>
                <button class="btn btn-ghost" id="loadBtn" title="Load CSS from stylesUrl">Load from site</button>
                <button class="btn btn-ghost" id="copyBtn">Copy</button>
            </div>
            <textarea id="cssEditor" placeholder="/* Type your CSS here — the preview updates in real time */&#10;&#10;/* Example:&#10;body { font-family: sans-serif; }&#10;.site-name { color: #c00; }&#10;*/"></textarea>
            <div class="editor-status" id="editorStatus">Hover an element in the preview to see its selector</div>
        </div>
    </div>

    <div id="selectorTooltip"></div>
</body>
</html>
