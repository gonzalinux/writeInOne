<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png"/>
    <title>Login — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
    <script src="/js/login.js" defer></script>
</head>
<body class="auth-layout">
    <div class="card">
        <a class="brand--muted" href="https://WriteInOne.com"><img src="/img/logoWriteInOneGrey.png" alt="" class="brand__img"/>WriteInOne</a>
        <h1>Log in</h1>
        <form id="loginForm" onsubmit="return false">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required/>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required/>
            </div>
            <p id="error" style="display:none;color:#c00;font-size:0.875rem;margin-top:0.75rem;"></p>
            <button class="btn btn--full" type="submit">Log in</button>
        </form>
        <p class="footer-link">No account? <a href="/admin/register">Create one</a></p>
    </div>
</body>
</html>
