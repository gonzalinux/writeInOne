<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create account — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
    <script src="/js/register.js" defer></script>
</head>
<body class="auth-layout">
    <div class="card">
        <div class="brand--muted">WriteInOne</div>
        <h1>Create account</h1>
        <form id="registerForm">
            <div class="field">
                <label for="displayName">Name</label>
                <input id="displayName" name="displayName" type="text" autocomplete="name" required placeholder="Your name"/>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required/>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="new-password" required/>
                <p class="hint">At least 8 characters</p>
            </div>
            <p id="error" style="display:none;color:#c00;font-size:0.875rem;margin-top:0.75rem;"></p>
            <button class="btn btn--full" type="submit">Create account</button>
        </form>
        <p class="footer-link">Already have an account? <a href="/admin/login">Log in</a></p>
    </div>
</body>
</html>
