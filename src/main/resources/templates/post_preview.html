<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:lang="${lang}">
<head>
    <th:block th:replace="~{fragments/layout :: head(${translation.title + ' — ' + site.name})}"/>

    <!-- Primary meta -->
    <meta th:if="${translation.excerpt != null}" name="description" th:content="${translation.excerpt}"/>

    <!-- Open Graph -->
    <meta property="og:type"                content="article"/>
    <meta property="og:site_name"           th:content="${site.name}"/>
    <meta property="og:title"               th:content="${translation.title}"/>
    <meta property="og:description"         th:if="${translation.excerpt != null}" th:content="${translation.excerpt}"/>
    <meta property="og:image"               th:if="${post.coverUrl != null}" th:content="${post.coverUrl}"/>
    <meta property="og:url"                 th:content="'https://' + ${site.domain} + '/' + ${lang} + '/' + ${translation.slug}"/>
    <meta property="article:published_time" th:if="${post.publishedAt != null}" th:content="${post.publishedAt}"/>

    <!-- Twitter / X -->
    <meta name="twitter:card"        th:content="${post.coverUrl != null ? 'summary_large_image' : 'summary'}"/>
    <meta name="twitter:title"       th:content="${translation.title}"/>
    <meta name="twitter:description" th:if="${translation.excerpt != null}" th:content="${translation.excerpt}"/>
    <meta name="twitter:image"       th:if="${post.coverUrl != null}" th:content="${post.coverUrl}"/>

    <!-- href is updated by theme.js on DOMContentLoaded to match the active theme -->
    <link id="hljs-theme" rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css"/>

    <link rel="stylesheet" href="/css/post-preview.css"/>
</head>
<body class="has-preview-bar">

    <!-- Data read by post-preview.js -->
    <div id="preview-data"
         th:data-post-id="${post.id}"
         th:data-site-id="${post.siteId}"
         th:data-lang="${lang}"
         th:data-status="${post.status.name().toLowerCase()}"
         th:data-scheduled-at="${post.scheduledAt}"
         data-admin-url="/admin"
         hidden>
    </div>

    <!-- Preview bar -->
    <div class="preview-bar">
        <div class="preview-bar__left">
            <span class="preview-bar__label">Preview</span>
            <span id="status-badge" class="status">DRAFT</span>
            <span id="unsaved-badge" class="unsaved-badge" hidden>● not saved</span>
        </div>
        <div class="preview-bar__right">
            <a href="/admin" class="preview-bar__btn">← Admin</a>
            <button th:if="${#lists.contains(site.availableThemes, T(com.gonzalinux.domain.site.Theme).LIGHT)
                         and #lists.contains(site.availableThemes, T(com.gonzalinux.domain.site.Theme).DARK)}"
                    class="preview-bar__btn" onclick="toggleTheme()" aria-label="Toggle theme">&#9789;</button>
            <button id="btn-edit-mode" class="preview-bar__btn">Edit</button>
            <button id="btn-split-mode" class="preview-bar__btn">Split</button>
            <button id="btn-preview-mode" class="preview-bar__btn preview-bar__btn--active">Preview</button>
            <button id="btn-save" class="preview-bar__btn preview-bar__save">Save</button>
            <button id="btn-publish" class="preview-bar__btn preview-bar__btn--publish">Publish</button>
            <button id="btn-schedule" class="preview-bar__btn">Schedule ▾</button>
        </div>
    </div>

    <!-- Schedule panel -->
    <div id="schedule-panel" class="schedule-panel" hidden>
        <input type="datetime-local" id="schedule-input"/>
        <button id="btn-schedule-confirm" class="preview-bar__btn preview-bar__btn--publish">Confirm</button>
        <button id="btn-schedule-cancel" class="preview-bar__btn">Cancel</button>
    </div>

    <!-- Error strip -->
    <div id="preview-error" hidden></div>

    <th:block th:replace="~{fragments/layout :: nav}"/>

    <main class="container">

        <!-- Preview section (left in split, full width otherwise) -->
        <section id="preview-section">
            <article>
                <header class="post-header">
                    <a class="post-header__back" th:href="'/' + ${lang}">← All posts</a>

                    <div class="post-header__meta">
                        <time th:datetime="${post.publishedAt}"
                              th:if="${post.publishedAt != null}"
                              th:text="${#temporals.format(post.publishedAt, 'MMM d, yyyy')}">Jan 1, 2025</time>
                    </div>

                    <h1 class="post-header__title" th:text="${translation.title}">Post Title</h1>

                    <p class="post-header__excerpt"
                       th:if="${translation.excerpt != null}"
                       th:text="${translation.excerpt}">Excerpt</p>

                    <div class="post-header__tags" th:if="${!tags.isEmpty()}">
                        <a class="tag"
                           th:each="tag : ${tags}"
                           th:text="${tag.name}"
                           th:href="@{/{lang}(lang=${lang}, tag=${tag.name})}">tag</a>
                    </div>

                    <img class="post-header__cover"
                         th:if="${post.coverUrl != null}"
                         th:src="${post.coverUrl}"
                         th:alt="${translation.title}"/>
                </header>

                <div class="post-body" th:utext="${renderedBody}">Post content</div>
            </article>
        </section>

        <!-- Edit section (right in split, hidden by default) -->
        <section id="edit-section" hidden>
            <article>
                <header class="post-header">
                    <a class="post-header__back" th:href="'/' + ${lang}">← All posts</a>

                    <div class="post-header__meta">
                        <time th:datetime="${post.publishedAt}"
                              th:if="${post.publishedAt != null}"
                              th:text="${#temporals.format(post.publishedAt, 'MMM d, yyyy')}">Jan 1, 2025</time>
                    </div>

                    <input id="edit-title" type="text" class="edit-input" th:value="${translation.title}"/>

                    <input id="edit-excerpt" type="text" class="edit-input" th:value="${translation.excerpt}"/>

                    <div class="post-header__tags" th:if="${!tags.isEmpty()}">
                        <a class="tag"
                           th:each="tag : ${tags}"
                           th:text="${tag.name}"
                           th:href="@{/{lang}(lang=${lang}, tag=${tag.name})}">tag</a>
                    </div>

                    <img class="post-header__cover"
                         th:if="${post.coverUrl != null}"
                         th:src="${post.coverUrl}"
                         th:alt="${translation.title}"/>

                    <div class="edit-meta">
                        <span class="edit-meta__field">
                            <span class="edit-meta__label">Slug</span>
                            <input id="edit-slug" type="text" class="edit-input" th:value="${translation.slug}"/>
                        </span>
                        <span class="edit-meta__field">
                            <span class="edit-meta__label">Tags</span>
                            <input id="edit-tags" type="text" class="edit-input"
                                   th:value="${#strings.listJoin(tags.![name], ', ')}"/>
                        </span>
                        <span class="edit-meta__field">
                            <span class="edit-meta__label">Cover URL</span>
                            <input id="edit-cover" type="text" class="edit-input" th:value="${post.coverUrl}"/>
                        </span>
                    </div>
                </header>

                <textarea id="edit-body" class="edit-input" th:text="${translation.body}"></textarea>
            </article>
        </section>

    </main>

    <th:block th:replace="~{fragments/layout :: footer}"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script>
        if (document.getElementById('preview-section') && !document.getElementById('preview-section').hidden) {
            hljs.highlightAll();
            document.querySelectorAll('.post-body pre').forEach(pre => {
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(pre.querySelector('code').innerText).then(() => {
                        btn.textContent = 'Copied!';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.textContent = 'Copy';
                            btn.classList.remove('copied');
                        }, 2000);
                    });
                });
                wrapper.appendChild(btn);
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/api.js" defer></script>
    <script src="/js/post-preview.js" defer></script>
</body>
</html>
