<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — WriteInOne</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f9f9f9;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        .brand {
            font-size: 1rem;
            font-weight: bold;
            color: #888;
            margin-bottom: 2rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.75rem; }
        .field { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.875rem; margin-bottom: 0.4rem; color: #555; }
        input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #1a1a1a; }
        .btn {
            width: 100%;
            padding: 0.7rem;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn:hover { background: #333; }
        .footer-link {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #888;
            text-align: center;
        }
        .footer-link a { color: #1a1a1a; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">WriteInOne</div>
        <h1>Log in</h1>
        <form method="post" action="/admin/login">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required/>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required/>
            </div>
            <button class="btn" type="submit">Log in</button>
        </form>
        <p class="footer-link">No account? <a href="/admin/register">Create one</a></p>
    </div>
</body>
</html>
