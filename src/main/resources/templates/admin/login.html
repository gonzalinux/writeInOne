<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body class="auth-layout">
    <div class="card">
        <div class="brand--muted">WriteInOne</div>
        <h1>Log in</h1>
        <form id="loginForm" onsubmit="return false">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required/>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required/>
            </div>
            <p id="error" style="display:none;color:#c00;font-size:0.875rem;margin-top:0.75rem;"></p>
            <button class="btn btn--full" type="submit">Log in</button>
        </form>
        <p class="footer-link">No account? <a href="/admin/register">Create one</a></p>
    </div>
    <script src="/js/login.js" defer></script>
</body>
</html>
