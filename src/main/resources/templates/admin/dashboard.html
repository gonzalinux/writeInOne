<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard — WriteInOne</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, 'Times New Roman', serif; background: #f9f9f9; color: #1a1a1a; }
        header {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand { font-weight: bold; font-size: 1rem; }
        .header-actions { display: flex; gap: 1rem; align-items: center; }
        .header-actions a { font-size: 0.875rem; color: #888; text-decoration: none; }
        .header-actions a:hover { color: #1a1a1a; }
        main { max-width: 860px; margin: 2.5rem auto; padding: 0 2rem; }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        h1 { font-size: 1.5rem; }
        .btn {
            display: inline-block;
            padding: 0.55rem 1.25rem;
            background: #1a1a1a;
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .btn:hover { background: #333; }
        .btn-ghost {
            background: none;
            border: 1px solid #ddd;
            color: #555;
        }
        .btn-ghost:hover { border-color: #aaa; color: #1a1a1a; }
        .site-list { display: flex; flex-direction: column; gap: 1rem; }
        .site-card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .site-card__info {}
        .site-card__name { font-size: 1.1rem; font-weight: bold; margin-bottom: 0.2rem; }
        .site-card__domain { font-size: 0.875rem; color: #888; }
        .site-card__actions { display: flex; gap: 0.75rem; flex-shrink: 0; }
        .empty {
            text-align: center;
            padding: 4rem 0;
            color: #888;
        }
        .empty p { margin-bottom: 1.5rem; font-style: italic; }
    </style>
</head>
<body>
    <header>
        <span class="brand">WriteInOne</span>
        <div class="header-actions">
            <a href="/admin/logout">Log out</a>
        </div>
    </header>

    <main>
        <div class="page-header">
            <h1>Your sites</h1>
            <a class="btn" href="/admin/sites/new">+ New site</a>
        </div>

        <div class="site-list" th:if="${!sites.isEmpty()}">
            <div class="site-card" th:each="site : ${sites}">
                <div class="site-card__info">
                    <div class="site-card__name" th:text="${site.name}">Site name</div>
                    <div class="site-card__domain" th:text="${site.domain}">domain.com</div>
                </div>
                <div class="site-card__actions">
                    <a class="btn btn-ghost" th:href="'/admin/sites/' + ${site.id} + '/posts'">Posts</a>
                    <a class="btn btn-ghost" th:href="'/admin/sites/' + ${site.id} + '/posts/new'">+ New post</a>
                </div>
            </div>
        </div>

        <div class="empty" th:if="${sites.isEmpty()}">
            <p>You don't have any sites yet.</p>
            <a class="btn" href="/admin/sites/new">Create your first site</a>
        </div>
    </main>
</body>
</html>
