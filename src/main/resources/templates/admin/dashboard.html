<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>
    <header>
        <span class="brand">WriteInOne</span>
        <div class="header-actions">
            <a href="/admin/logout">Log out</a>
        </div>
    </header>

    <main>
        <div class="page-header">
            <h1>Your sites</h1>
            <a class="btn" href="/admin/sites/new">+ New site</a>
        </div>

        <div class="site-list" th:if="${!sites.isEmpty()}">
            <div class="site-card" th:each="site : ${sites}">
                <div class="site-card__info">
                    <div class="site-card__name" th:text="${site.name}">Site name</div>
                    <div class="site-card__domain" th:text="${site.domain}">domain.com</div>
                </div>
                <div class="site-card__actions">
                    <a class="btn btn-ghost" th:href="'/admin/sites/' + ${site.id} + '/posts'">Posts</a>
                    <a class="btn btn-ghost" th:href="'/admin/sites/' + ${site.id} + '/posts/new'">+ New post</a>
                    <a class="btn btn-ghost" th:href="'/admin/sites/' + ${site.id} + '/edit'">Edit</a>
                </div>
            </div>
        </div>

        <div class="empty" th:if="${sites.isEmpty()}">
            <p>You don't have any sites yet.</p>
            <a class="btn" href="/admin/sites/new">Create your first site</a>
        </div>
    </main>
</body>
</html>
