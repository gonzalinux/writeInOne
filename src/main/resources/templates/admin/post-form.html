<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${postId != null ? 'Edit post' : 'New post'} + ' — WriteInOne'">Post — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>
    <header>
        <span class="brand">WriteInOne</span>
        <a th:href="'/admin/sites/' + ${siteId} + '/posts'">← Posts</a>
    </header>

    <main class="main--narrow">
        <h1 th:text="${postId != null ? 'Edit post' : 'New post'}">New post</h1>
        <form id="postForm"
              th:data-site-id="${siteId}"
              th:data-post-id="${postId != null} ? ${postId} : ''"
              onsubmit="return false">
            <div class="field-row">
                <div>
                    <label for="lang">Language</label>
                    <select id="lang" name="lang">
                        <option th:each="l : ${languages}"
                                th:value="${l.value}"
                                th:text="${l.name()}"
                                th:selected="${translation != null and translation.lang == l.value}">English</option>
                    </select>
                </div>
                <div>
                    <label for="slug">Slug <span style="color:#aaa">(optional)</span></label>
                    <input id="slug" name="slug" type="text" placeholder="auto-generated from title"
                           th:value="${translation != null ? translation.slug : ''}"/>
                </div>
            </div>

            <div class="field">
                <label for="title">Title</label>
                <input id="title" name="title" type="text" required placeholder="Post title"
                       th:value="${translation != null ? translation.title : ''}"/>
            </div>

            <div class="field">
                <label for="excerpt">Excerpt <span style="color:#aaa">(optional)</span></label>
                <textarea id="excerpt" name="excerpt" rows="2"
                          placeholder="A short summary shown in post listings"
                          th:text="${translation != null ? translation.excerpt : ''}"></textarea>
            </div>

            <div class="field">
                <label for="body">Body <span style="color:#aaa">(Markdown)</span></label>
                <textarea id="body" name="body" class="body-editor" required
                          placeholder="Write your post in Markdown..."
                          th:text="${translation != null ? translation.body : ''}"></textarea>
            </div>

            <div class="field-row">
                <div>
                    <label for="tags">Tags <span style="color:#aaa">(optional)</span></label>
                    <input id="tags" name="tags" type="text" placeholder="kotlin, spring, webflux"
                           th:value="${tagsValue != null ? tagsValue : ''}"/>
                    <p class="hint">Comma-separated</p>
                </div>
                <div>
                    <label for="coverUrl">Cover image URL <span style="color:#aaa">(optional)</span></label>
                    <input id="coverUrl" name="coverUrl" type="url" placeholder="https://..."
                           th:value="${post != null ? post.coverUrl : ''}"/>
                </div>
            </div>

            <p id="error" style="display:none;color:#c00;font-size:0.875rem;margin-top:0.75rem;"></p>
            <div class="actions">
                <button class="btn" type="submit">Save draft</button>
                <a class="btn btn-ghost" th:href="'/admin/sites/' + ${siteId} + '/posts'">Cancel</a>
                <button th:if="${post != null and post.status.name() != 'PUBLISHED'}"
                        id="publishBtn" type="button" class="btn btn-publish">Publish</button>
            </div>
        </form>
    </main>
    <script src="/js/post-form.js" defer></script>
</body>
</html>
