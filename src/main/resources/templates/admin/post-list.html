<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Posts — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>
<header>
    <span class="brand">WriteInOne</span>
    <a href="/admin">← Dashboard</a>
</header>

<main>
    <div class="page-header">
        <h1>Posts</h1>
        <a class="btn" th:href="'/admin/sites/' + ${siteId} + '/posts/new'">+ New post</a>
    </div>

    <!--/*@thymesVar id="posts" type="java.util.List<com.gonzalinux.domain.post.PostWithTranslations>"*/-->
    <table th:if="${!posts.isEmpty()}">
        <thead>
        <tr>
            <th>Title</th>
            <th>Languages</th>
            <th>Status</th>
            <th>Published</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${posts}">
            <!--/*@thymesVar id="item" type="com.gonzalinux.domain.post.PostWithTranslations"*/-->
            <td th:text="${item.translations[0].title}">Title</td>
            <td><span th:each="transla : ${item.translations}" th:text="${transla.lang + ' '}"></span></td>
            <td>
                <span class="status"
                      th:classappend="'status--' + ${item.post.status.name().toLowerCase()}"
                      th:text="${item.post.status.name().toLowerCase()}">draft</span>
            </td>
            <td th:text="${item.post.publishedAt != null ? #temporals.format(item.post.publishedAt, 'MMM d, yyyy') : '—'}">—</td>
            <td class="td-actions">
                <a class="action-link" th:href="'/admin/sites/' + ${siteId} + '/posts/' + ${item.post.id} + '/edit'">Edit</a>
                <button th:if="${item.post.status.name() != 'PUBLISHED'}"
                        class="action-btn"
                        th:data-site-id="${siteId}"
                        th:data-publish-post="${item.post.id}">Publish</button>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="empty" th:if="${posts.isEmpty()}">
        <p>No posts yet.</p>
        <a class="btn" th:href="'/admin/sites/' + ${siteId} + '/posts/new'">Write your first post</a>
    </div>
</main>
<script src="/js/post-list.js" defer></script>
</body>
</html>
