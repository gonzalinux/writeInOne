<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${site != null} ? 'Edit site — WriteInOne' : 'New site — WriteInOne'">Site — WriteInOne</title>
    <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>
    <header>
        <span class="brand">WriteInOne</span>
        <a href="/admin">← Dashboard</a>
    </header>

    <main class="main--compact">
        <h1 th:text="${site != null} ? 'Edit site' : 'New site'">Site</h1>
        <form id="siteForm"
              th:data-site-id="${site != null} ? ${site.id} : ''"
              onsubmit="return false">

            <!-- Basic -->
            <h2 class="section-title">Basic</h2>
            <div class="field">
                <label for="name">Site name</label>
                <input id="name" type="text" required placeholder="My Blog"
                       th:value="${site != null} ? ${site.name} : ''"/>
            </div>
            <div class="field" th:if="${site == null}">
                <label for="domain">Domain</label>
                <input id="domain" type="text" required placeholder="blog.example.com"/>
                <p class="hint">The domain where your blog will be served (e.g. blog.example.com)</p>
            </div>
            <div class="field" th:if="${site != null}">
                <label>Domain</label>
                <input type="text" disabled th:value="${site.domain}"/>
                <p class="hint">Domain cannot be changed after creation.</p>
            </div>
            <div class="field">
                <label for="description">Description <span style="color:#aaa">(optional)</span></label>
                <textarea id="description" placeholder="A short description of your blog"
                          th:text="${site != null} ? ${site.description} : ''"></textarea>
            </div>

            <!-- Appearance -->
            <h2 class="section-title">Appearance</h2>
            <div class="field">
                <label for="stylesUrl">Styles URL <span style="color:#aaa">(optional)</span></label>
                <input id="stylesUrl" type="url" placeholder="https://example.com/styles.css"
                       th:value="${site != null} ? ${site.stylesUrl} : ''"/>
            </div>
            <div class="field">
                <label for="faviconUrl">Favicon URL <span style="color:#aaa">(optional)</span></label>
                <input id="faviconUrl" type="url" placeholder="https://example.com/favicon.ico"
                       th:value="${site != null} ? ${site.config.faviconUrl} : ''"/>
            </div>

            <!-- Languages -->
            <h2 class="section-title">Languages</h2>

            <!-- English -->
            <div class="lang-block">
                <label class="lang-toggle">
                    <input type="checkbox" id="lang-ENGLISH" value="ENGLISH"
                           th:checked="${site == null or site.languages.contains(T(com.gonzalinux.domain.Languages).ENGLISH)}"/>
                    <span>English</span>
                </label>
                <div class="lang-config" id="config-ENGLISH">
                    <div class="field">
                        <label for="en-footer">Footer text <span style="color:#aaa">(optional)</span></label>
                        <textarea id="en-footer" rows="2" placeholder="Footer content for the English version"
                                  th:text="${site != null} ? ${site.config.en.footer} : ''"></textarea>
                    </div>
                    <div class="field">
                        <label>Navigation links</label>
                        <div id="en-nav">
                            <th:block th:if="${site != null}">
                                <div class="nav-link-row" th:each="link : ${site.config.en.nav}">
                                    <input type="text" class="nav-label" placeholder="Label" th:value="${link.label}"/>
                                    <input type="url" class="nav-url" placeholder="https://..." th:value="${link.url}"/>
                                    <button type="button" class="btn-icon remove-nav-link" title="Remove">×</button>
                                </div>
                            </th:block>
                        </div>
                        <button type="button" class="btn btn-ghost btn--small" data-add-nav="en-nav">+ Add link</button>
                    </div>
                </div>
            </div>

            <!-- Spanish -->
            <div class="lang-block">
                <label class="lang-toggle">
                    <input type="checkbox" id="lang-SPANISH" value="SPANISH"
                           th:checked="${site != null and site.languages.contains(T(com.gonzalinux.domain.Languages).SPANISH)}"/>
                    <span>Spanish</span>
                </label>
                <div class="lang-config" id="config-SPANISH">
                    <div class="field">
                        <label for="es-footer">Footer text <span style="color:#aaa">(optional)</span></label>
                        <textarea id="es-footer" rows="2" placeholder="Footer content for the Spanish version"
                                  th:text="${site != null} ? ${site.config.es.footer} : ''"></textarea>
                    </div>
                    <div class="field">
                        <label>Navigation links</label>
                        <div id="es-nav">
                            <th:block th:if="${site != null}">
                                <div class="nav-link-row" th:each="link : ${site.config.es.nav}">
                                    <input type="text" class="nav-label" placeholder="Label" th:value="${link.label}"/>
                                    <input type="url" class="nav-url" placeholder="https://..." th:value="${link.url}"/>
                                    <button type="button" class="btn-icon remove-nav-link" title="Remove">×</button>
                                </div>
                            </th:block>
                        </div>
                        <button type="button" class="btn btn-ghost btn--small" data-add-nav="es-nav">+ Add link</button>
                    </div>
                </div>
            </div>

            <p id="error" style="display:none;color:#c00;font-size:0.875rem;margin-top:0.75rem;"></p>
            <div class="actions">
                <button class="btn" type="submit" th:text="${site != null} ? 'Save changes' : 'Create site'">Submit</button>
                <a class="btn btn-ghost" href="/admin">Cancel</a>
            </div>
        </form>
    </main>
    <script src="/js/site-form.js" defer></script>
</body>
</html>
