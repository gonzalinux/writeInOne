<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WriteInOne</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: -0.5px;
            margin-bottom: 3rem;
            color: #888;
        }

        h1 {
            font-size: 2.5rem;
            line-height: 1.2;
            max-width: 560px;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            color: #555;
            max-width: 420px;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.75rem;
            border-radius: 4px;
            font-size: 0.95rem;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-primary {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-primary:hover { background: #333; }

        .btn-secondary {
            border: 1px solid #ddd;
            color: #555;
        }

        .btn-secondary:hover { border-color: #aaa; color: #1a1a1a; }

        footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.8rem;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="logo">WriteInOne</div>

    <h1>Nothing here yet.</h1>
    <p>This domain hasn't been set up as a blog. If you own it, log in to get started.</p>

    <div class="actions">
        <a class="btn btn-primary" href="/admin/login">Log in</a>
        <a class="btn btn-secondary" href="/admin/register">Create an account</a>
    </div>

    <footer>Powered by WriteInOne</footer>
</body>
</html>
