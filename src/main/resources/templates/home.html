<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!--/*@thymesVar id="prefix" type="String"*/-->
    <link rel="icon" type="image/x-icon" th:href="${prefix} + '/img/favicon.ico'"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="${prefix} + '/img/favicon-32x32.png'"/>
    <link rel="icon" type="image/png" sizes="16x16" th:href="${prefix} + '/img/favicon-16x16.png'"/>
    <link rel="apple-touch-icon" sizes="180x180" th:href="${prefix} + '/img/apple-touch-icon.png'"/>
    <link rel="manifest" href="/manifest.json"/>
    <title>WriteInOne</title>
    <link rel="stylesheet" th:href="${prefix} + '/css/blog.css'"/>
</head>
<body>
    <a class="logo" href="https://WriteInOne.com">
        <img th:src="${prefix} + '/img/logoWriteInOneGrey.png'" alt="WriteInOne" class="logo__img"/>
        WriteInOne
    </a>

    <h1>Nothing here yet.</h1>
    <p>This domain hasn't been set up as a blog. If you own it, log in to get started.</p>

    <div class="actions">
        <a class="btn btn-primary" href="/admin/login">Log in</a>
        <a class="btn btn-secondary" href="/admin/register">Create an account</a>
    </div>

    <footer>
        <a href="https://WriteInOne.com" class="footer__link">
            <img th:src="${prefix} + '/img/logoWriteInOneGrey.png'" alt="WriteInOne" class="footer__img"/>
            Powered by WriteInOne
        </a>
    </footer>
</body>
</html>
