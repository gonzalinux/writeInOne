<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png"/>
    <link rel="manifest" href="/manifest.json"/>
    <title>WriteInOne</title>
    <link rel="stylesheet" href="/css/landing.css"/>
</head>
<body>
    <a class="logo" href="https://WriteInOne.com">
        <img src="/img/logoWriteInOneGrey.png" alt="WriteInOne" class="logo__img"/>
        WriteInOne
    </a>

    <h1>Your blog, your domain.</h1>
    <p>A simple place to write. Connect a domain, publish posts, and share your words with the world.</p>

    <div class="actions">
        <a class="btn btn-primary" href="/admin/register">Get started</a>
        <a class="btn btn-secondary" href="/admin/login">Log in</a>
    </div>

    <footer>
        <a href="https://WriteInOne.com" class="footer__link">
            <img src="/img/logoWriteInOneGrey.png" alt="WriteInOne" class="footer__img"/>
            WriteInOne
        </a>
    </footer>

</html>
