<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:lang="${lang}">
<head>
    <th:block th:replace="~{fragments/layout :: head(${site.name})}"/>
</head>
<body>
    <th:block th:replace="~{fragments/layout :: nav}"/>

    <main class="container">
        <div class="site-hero" th:if="${site.description != null}">
            <p class="site-description" th:text="${site.description}">Site description</p>
        </div>

        <ul class="post-list" th:if="${!posts.isEmpty()}">
            <li class="post-card" th:each="item : ${posts}">
                <img class="post-card__cover"
                     th:if="${item.post.coverUrl != null}"
                     th:src="${item.post.coverUrl}"
                     th:alt="${item.translation.title}"/>

                <div class="post-card__meta">
                    <time th:datetime="${item.post.publishedAt}"
                          th:text="${#temporals.format(item.post.publishedAt, 'MMM d, yyyy')}">Jan 1, 2025</time>
                </div>

                <h2 class="post-card__title">
                    <a th:href="'/' + ${lang} + '/' + ${item.translation.slug}"
                       th:text="${item.translation.title}">Post title</a>
                </h2>

                <p class="post-card__excerpt"
                   th:if="${item.translation.excerpt != null}"
                   th:text="${item.translation.excerpt}">Excerpt</p>

                <div class="post-card__tags" th:if="${!item.tags.isEmpty()}">
                    <span class="tag" th:each="tag : ${item.tags}" th:text="${tag.name}">tag</span>
                </div>
            </li>
        </ul>

        <p class="empty-state" th:if="${posts.isEmpty()}">No posts yet.</p>
    </main>

    <th:block th:replace="~{fragments/layout :: footer}"/>
</body>
</html>
