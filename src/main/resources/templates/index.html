<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:lang="${lang}">
<head>
    <th:block th:replace="~{fragments/layout :: head(${site.name})}"/>

    <!-- Primary meta -->
    <meta th:if="${site.description != null}" name="description" th:content="${site.description}"/>

    <!-- Open Graph -->
    <meta property="og:type"        content="website"/>
    <meta property="og:site_name"   th:content="${site.name}"/>
    <meta property="og:title"       th:content="${site.name}"/>
    <meta property="og:description" th:if="${site.description != null}" th:content="${site.description}"/>
    <meta property="og:url"         th:content="'https://' + ${site.domain} + ${prefix} + '/' + ${lang}"/>

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary"/>
    <meta name="twitter:title"       th:content="${site.name}"/>
    <meta name="twitter:description" th:if="${site.description != null}" th:content="${site.description}"/>
</head>
<body>
    <th:block th:replace="~{fragments/layout :: nav}"/>

    <main class="container">
        <div class="site-hero">
            <h1 class="site-hero__title" th:text="${site.name}">Site Name</h1>
            <p class="site-description" th:if="${site.description != null}" th:text="${site.description}">Site description</p>
        </div>

        <form id="search-form" class="search-bar" method="get"
              th:action="${prefix} + '/' + ${lang}" th:data-lang="${lang}" th:data-prefix="${prefix}">
            <input id="search-input" class="search-bar__input" type="text" name="search"
                   th:value="${search}" placeholder="Search posts…" autocomplete="off"/>
            <button class="search-bar__btn" type="submit">Search</button>
            <a id="search-clear" class="search-bar__clear"
               th:if="${search != null or activeTag != null}"
               th:href="${prefix} + '/' + ${lang}">✕ Clear</a>
        </form>

        <div id="post-list-container">
        <p class="filter-label" th:if="${activeTag != null}">
            Filtering by tag: <strong th:text="${activeTag}"></strong>
        </p>

        <ul class="post-list" th:if="${!posts.isEmpty()}">
            <li class="post-card" th:each="item : ${posts}">
                <img class="post-card__cover"
                     th:if="${not #strings.isEmpty(item.post.coverUrl)}"
                     th:src="${item.post.coverUrl}"
                     th:alt="${item.translation.title}"/>

                <div class="post-card__meta">
                    <time th:datetime="${item.post.publishedAt}"
                          th:text="${#temporals.format(item.post.publishedAt, 'MMM d, yyyy')}">Jan 1, 2025</time>
                </div>

                <h2 class="post-card__title">
                    <a th:href="${prefix} + '/' + ${lang} + '/blogs/' + ${item.translation.slug}"
                       th:text="${item.translation.title}">Post title</a>
                </h2>

                <p class="post-card__excerpt"
                   th:if="${item.translation.excerpt != null}"
                   th:text="${item.translation.excerpt}">Excerpt</p>

                <div class="post-card__tags" th:if="${!item.tags.isEmpty()}">
                    <a class="tag"
                       th:each="tag : ${item.tags}"
                       th:text="${tag.name}"
                       th:href="${prefix} + '/' + ${lang} + '?tag=' + ${tag.name}">tag</a>
                </div>
            </li>
        </ul>

        <p class="empty-state" th:if="${posts.isEmpty()}">No posts yet.</p>

        <nav class="pagination" th:if="${totalPages > 1}">
            <a class="pagination__btn"
               th:if="${currentPage > 0}"
               th:href="${prefix} + '/' + ${lang} + '?page=' + ${currentPage - 1} + ${activeTag != null ? '&tag=' + activeTag : ''} + ${search != null ? '&search=' + search : ''}">← Newer</a>
            <span class="pagination__info"
                  th:text="${currentPage + 1} + ' / ' + ${totalPages}">1 / 3</span>
            <a class="pagination__btn"
               th:if="${currentPage + 1 < totalPages}"
               th:href="${prefix} + '/' + ${lang} + '?page=' + ${currentPage + 1} + ${activeTag != null ? '&tag=' + activeTag : ''} + ${search != null ? '&search=' + search : ''}">Older →</a>
        </nav>
        </div>

        <script th:src="${prefix} + '/js/blog-search.js'" defer></script>
    </main>

    <th:block th:replace="~{fragments/layout :: footer}"/>
</body>
</html>
