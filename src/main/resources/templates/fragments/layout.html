<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="html">

<!-- HEAD fragment -->
<th:block th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">Blog</title>
    <link rel="icon" th:if="${site.config.faviconUrl != null}" th:href="${site.config.faviconUrl}"/>
    <!-- RSS auto-discovery — one per language, readers will find these automatically -->
    <th:block th:each="l : ${site.languages}">
        <link rel="alternate" type="application/rss+xml"
              th:title="${site.name + ' (' + l.value + ')'}"
              th:href="'/' + ${l.value} + '/rss.xml'"/>
    </th:block>
    <!-- Expose available themes to theme.js before it runs -->
    <script th:inline="javascript">
        window.SITE_THEMES = /*[[${site.availableThemes}]]*/['LIGHT'];
    </script>
    <!-- Theme script — sync (no defer) so html.dark class is set before first paint -->
    <script src="/js/theme.js"></script>
    <!-- Default blog stylesheet — all classes are overridable by the site's custom stylesheet -->
    <link rel="stylesheet" href="/css/blog.css"/>
    <!-- Site custom stylesheet loaded after defaults so it can override any class -->
    <link th:if="${site.stylesUrl != null}" rel="stylesheet" th:href="${site.stylesUrl}"/>
</th:block>

<!-- HEADER/NAV fragment -->
<th:block th:fragment="nav">
    <header>
        <div class="container">
            <nav>
                <a class="site-name" th:href="'/' + ${lang}" th:text="${site.name}">Site Name</a>
                <div class="nav-right">
                    <ul class="nav-links" th:if="${langConfig != null and !langConfig.nav.isEmpty()}">
                        <li th:each="link : ${langConfig.nav}">
                            <a th:href="${link.url}" th:text="${link.label}">Link</a>
                        </li>
                    </ul>
                    <button th:if="${#lists.contains(site.availableThemes, T(com.gonzalinux.domain.site.Theme).LIGHT)
                                 and #lists.contains(site.availableThemes, T(com.gonzalinux.domain.site.Theme).DARK)}"
                            id="themeBtn" class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">&#9789;</button>
                </div>
            </nav>
        </div>
    </header>
</th:block>

<!-- FOOTER fragment -->
<th:block th:fragment="footer">
    <footer>
        <div class="container">
            <p th:if="${langConfig != null and !langConfig.footer.isEmpty()}"
               th:text="${langConfig.footer}">Footer text</p>
            <p th:if="${langConfig == null or langConfig.footer.isEmpty()}"
               th:text="'© ' + ${site.name}">© Site</p>
        </div>
    </footer>
</th:block>

</html>
