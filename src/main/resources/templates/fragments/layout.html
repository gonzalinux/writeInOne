<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="html">

<!-- HEAD fragment -->
<th:block th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">Blog</title>
    <link rel="icon" th:if="${site.stylesUrl != null}" th:href="${site.config.faviconUrl}"/>
    <!-- Default minimal styles -->
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 18px;
            line-height: 1.7;
            color: #1a1a1a;
            background: #fff;
        }

        a { color: inherit; }
        a:hover { text-decoration: none; }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Nav */
        header {
            border-bottom: 1px solid #e5e5e5;
            padding: 1.25rem 0;
            margin-bottom: 3rem;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .site-name {
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            font-size: 0.95rem;
            color: #555;
        }

        .nav-links a:hover { color: #1a1a1a; }

        /* Footer */
        footer {
            border-top: 1px solid #e5e5e5;
            margin-top: 4rem;
            padding: 2rem 0;
            font-size: 0.875rem;
            color: #888;
            text-align: center;
        }
    </style>
    <!-- Site custom stylesheet -->
    <link th:if="${site.stylesUrl != null}" rel="stylesheet" th:href="${site.stylesUrl}"/>
</th:block>

<!-- HEADER/NAV fragment -->
<th:block th:fragment="nav">
    <header>
        <div class="container">
            <nav>
                <a class="site-name" th:href="'/' + ${lang}" th:text="${site.name}">Site Name</a>
                <ul class="nav-links" th:if="${langConfig != null and !langConfig.nav.isEmpty()}">
                    <li th:each="link : ${langConfig.nav}">
                        <a th:href="${link.url}" th:text="${link.label}">Link</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
</th:block>

<!-- FOOTER fragment -->
<th:block th:fragment="footer">
    <footer>
        <div class="container">
            <p th:if="${langConfig != null and !langConfig.footer.isEmpty()}"
               th:text="${langConfig.footer}">Footer text</p>
            <p th:if="${langConfig == null or langConfig.footer.isEmpty()}"
               th:text="'© ' + ${site.name}">© Site</p>
        </div>
    </footer>
</th:block>

</html>
