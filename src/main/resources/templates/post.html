<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:lang="${lang}">
<head>
    <th:block th:replace="~{fragments/layout :: head(${translation.title + ' — ' + site.name})}"/>
    <meta th:if="${translation.excerpt != null}" name="description" th:content="${translation.excerpt}"/>
    <style>
        .post-header {
            margin-bottom: 2.5rem;
        }

        .post-header__back {
            display: inline-block;
            font-size: 0.875rem;
            color: #888;
            text-decoration: none;
            margin-bottom: 1.5rem;
        }

        .post-header__back:hover { color: #1a1a1a; }

        .post-header__meta {
            font-size: 0.875rem;
            color: #888;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .post-header__title {
            font-size: 2.2rem;
            line-height: 1.25;
            margin-bottom: 0.75rem;
        }

        .post-header__excerpt {
            font-size: 1.1rem;
            color: #555;
            font-style: italic;
            margin-bottom: 1.25rem;
        }

        .post-header__cover {
            width: 100%;
            aspect-ratio: 16 / 7;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 1.5rem;
        }

        .post-header__tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.75rem;
        }

        .tag {
            font-size: 0.78rem;
            padding: 0.2rem 0.55rem;
            background: #f0f0f0;
            border-radius: 999px;
            color: #555;
        }

        /* Prose styles for rendered Markdown */
        .post-body {
            margin-top: 2.5rem;
        }

        .post-body h1,
        .post-body h2,
        .post-body h3,
        .post-body h4 {
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        .post-body p { margin-bottom: 1.25rem; }

        .post-body ul,
        .post-body ol {
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }

        .post-body li { margin-bottom: 0.25rem; }

        .post-body blockquote {
            border-left: 3px solid #ddd;
            padding-left: 1rem;
            color: #666;
            margin: 1.5rem 0;
        }

        .post-body pre {
            background: #f6f6f6;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
        }

        .post-body code {
            font-family: 'Courier New', monospace;
            font-size: 0.875em;
            background: #f0f0f0;
            padding: 0.15em 0.35em;
            border-radius: 3px;
        }

        .post-body pre code {
            background: none;
            padding: 0;
        }

        .post-body img {
            max-width: 100%;
            border-radius: 4px;
        }

        .post-body a {
            text-decoration: underline;
            color: #1a1a1a;
        }

        .post-body hr {
            border: none;
            border-top: 1px solid #e5e5e5;
            margin: 2rem 0;
        }

        .post-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }

        .post-body th,
        .post-body td {
            border: 1px solid #e5e5e5;
            padding: 0.5rem 0.75rem;
            text-align: left;
        }

        .post-body th { background: #f6f6f6; }
    </style>
</head>
<body>
    <th:block th:replace="~{fragments/layout :: nav}"/>

    <main class="container">
        <article>
            <header class="post-header">
                <a class="post-header__back" th:href="'/' + ${lang}">← All posts</a>

                <div class="post-header__meta">
                    <time th:datetime="${post.publishedAt}"
                          th:text="${#temporals.format(post.publishedAt, 'MMM d, yyyy')}">Jan 1, 2025</time>
                </div>

                <h1 class="post-header__title" th:text="${translation.title}">Post Title</h1>

                <p class="post-header__excerpt"
                   th:if="${translation.excerpt != null}"
                   th:text="${translation.excerpt}">Excerpt</p>

                <div class="post-header__tags" th:if="${!tags.isEmpty()}">
                    <span class="tag" th:each="tag : ${tags}" th:text="${tag.name}">tag</span>
                </div>

                <img class="post-header__cover"
                     th:if="${post.coverUrl != null}"
                     th:src="${post.coverUrl}"
                     th:alt="${translation.title}"/>
            </header>

            <!-- th:utext renders the pre-rendered HTML from flexmark -->
            <div class="post-body" th:utext="${renderedBody}">Post content</div>
        </article>
    </main>

    <th:block th:replace="~{fragments/layout :: footer}"/>
</body>
</html>
