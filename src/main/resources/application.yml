spring:
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:writeinone}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:secret}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:writeinone}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:secret}

  flyway:
    enabled: true
