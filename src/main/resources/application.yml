spring:
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:writeinone}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:secret}

  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:writeinone}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:secret}

jwt:
  secret: ${JWT_SECRET:local-dev-secret-change-this-in-production-min-32-chars}
  access-token-expiry-minutes: 15
  refresh-token-expiry-days: 30

token-scheduler:
  interval-min: 30
  limit-deleted: 100

post-scheduler:
  interval-ms: 60000