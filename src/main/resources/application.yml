server:
  port: ${SERVER_PORT:8080}

json:
  log:
    path: ${JSON_LOG_PATH:}

spring:
  thymeleaf:
    cache: ${THYMELEAF_CACHE:true}

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:writeinone}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:secret}
    pool:
      validation-query: SELECT 1
      max-idle-time: 10m

  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:writeinone}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:secret}

jwt:
  secret: ${JWT_SECRET:local-dev-secret-change-this-in-production-min-32-chars}
  access-token-expiry-minutes: 15
  refresh-token-expiry-days: 30

token-scheduler:
  interval-min: 30
  limit-deleted: 100

post-scheduler:
  interval-ms: 60000

site-verificator:
  interval-sec: 120

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      base-path: /
      path-mapping:
        prometheus: metrics
      exposure:
        include: health, prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http_request_duration_milliseconds: true